# Example nginx front door for CAP-CONNECT with oauth2-proxy.
# Adapt server_name, TLS paths, and upstream hosts to your environment.

upstream web_upstream      { server 127.0.0.1:3000; }
upstream api_upstream      { server 127.0.0.1:8080; }
upstream forecast_upstream { server 127.0.0.1:8082; }
upstream oauth2_proxy      { server 127.0.0.1:4180; }

server {
  listen 443 ssl;
  server_name your-app-host;

  ssl_certificate     /etc/ssl/certs/your-app.crt;
  ssl_certificate_key /etc/ssl/private/your-app.key;

  # --- Strip any client-supplied identity headers (anti-spoofing). ---
  # These are set ONLY from the oauth2-proxy auth response below.
  proxy_set_header X-Forwarded-Email "";
  proxy_set_header X-Email "";
  proxy_set_header X-Forwarded-User "";
  proxy_set_header X-User "";

  # oauth2-proxy's own endpoints (sign-in, callback, etc.)
  location /oauth2/ {
    proxy_pass http://oauth2_proxy;
    proxy_set_header Host             $host;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-Uri  $request_uri;
  }

  # Internal subrequest that authenticates every app request.
  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2_proxy;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI  $request_uri;
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    # Pull the authenticated email out of the auth response and forward it.
    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    proxy_set_header X-Forwarded-Email $auth_email;

    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Route by path (mirrors web/next.config.js rewrites).
    # forecast-service owns /api/auth, /api/forecast, /api/planning, /api/uploads.
    location ~ ^/api/(auth|forecast|planning|uploads) {
      auth_request /oauth2/auth;
      auth_request_set $auth_email $upstream_http_x_auth_request_email;
      proxy_set_header X-Forwarded-Email $auth_email;
      proxy_pass http://forecast_upstream;
    }

    location /api/ {
      auth_request /oauth2/auth;
      auth_request_set $auth_email $upstream_http_x_auth_request_email;
      proxy_set_header X-Forwarded-Email $auth_email;
      proxy_pass http://api_upstream;
    }

    proxy_pass http://web_upstream;
  }
}
