# Example nginx front door for CAP-CONNECT with oauth2-proxy.
# Adapt server_name, TLS paths, and upstream hosts to your environment.

upstream web_upstream      { server 127.0.0.1:3000; }
upstream api_upstream      { server 127.0.0.1:8080; }
upstream forecast_upstream { server 127.0.0.1:8082; }
upstream oauth2_proxy      { server 127.0.0.1:4180; }

server {
  listen 443 ssl;
  server_name your-app-host;

  ssl_certificate     /etc/ssl/certs/your-app.crt;
  ssl_certificate_key /etc/ssl/private/your-app.key;

  # --- Anti-spoofing: strip every client-supplied identity header. ---
  # IMPORTANT: nginx `proxy_set_header` is NOT additive across contexts. The
  # moment a `location` block defines ANY proxy_set_header, it DISCARDS the
  # entire inherited set from this `server` block. So these server-level strips
  # below are a backstop only — the identity headers MUST be re-stripped inside
  # every `location` that proxies upstream (see snippet repeated below). The
  # backends trust X-Forwarded-Email / X-Email / X-User-Email (identity) and
  # X-User-Photo / X-Photo-Url (avatar) when TRUST_PROXY_AUTH=1, so all of these
  # must be cleared from the inbound request and set ONLY from oauth2-proxy.
  proxy_set_header X-Forwarded-Email "";
  proxy_set_header X-Email "";
  proxy_set_header X-User-Email "";
  proxy_set_header X-Forwarded-User "";
  proxy_set_header X-User "";
  proxy_set_header X-Forwarded-Preferred-Username "";
  proxy_set_header X-User-Photo "";
  proxy_set_header X-Photo-Url "";

  # oauth2-proxy's own endpoints (sign-in, callback, etc.)
  location /oauth2/ {
    proxy_pass http://oauth2_proxy;
    proxy_set_header Host             $host;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-Uri  $request_uri;
  }

  # Internal subrequest that authenticates every app request.
  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2_proxy;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI  $request_uri;
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    # Re-strip inbound identity headers (parent strips are NOT inherited here).
    proxy_set_header X-Email "";
    proxy_set_header X-User-Email "";
    proxy_set_header X-Forwarded-User "";
    proxy_set_header X-User "";
    proxy_set_header X-Forwarded-Preferred-Username "";
    proxy_set_header X-User-Photo "";
    proxy_set_header X-Photo-Url "";

    # Pull the authenticated email out of the auth response and forward it.
    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    proxy_set_header X-Forwarded-Email $auth_email;

    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Route by path (mirrors web/next.config.js rewrites).
    # forecast-service owns /api/auth, /api/forecast, /api/planning, /api/uploads.
    location ~ ^/api/(auth|forecast|planning|uploads) {
      auth_request /oauth2/auth;

      # Re-strip inbound identity headers in this nested location too.
      proxy_set_header X-Email "";
      proxy_set_header X-User-Email "";
      proxy_set_header X-Forwarded-User "";
      proxy_set_header X-User "";
      proxy_set_header X-Forwarded-Preferred-Username "";
      proxy_set_header X-User-Photo "";
      proxy_set_header X-Photo-Url "";

      auth_request_set $auth_email $upstream_http_x_auth_request_email;
      proxy_set_header X-Forwarded-Email $auth_email;
      proxy_pass http://forecast_upstream;
    }

    location /api/ {
      auth_request /oauth2/auth;

      # Re-strip inbound identity headers in this nested location too.
      proxy_set_header X-Email "";
      proxy_set_header X-User-Email "";
      proxy_set_header X-Forwarded-User "";
      proxy_set_header X-User "";
      proxy_set_header X-Forwarded-Preferred-Username "";
      proxy_set_header X-User-Photo "";
      proxy_set_header X-Photo-Url "";

      auth_request_set $auth_email $upstream_http_x_auth_request_email;
      proxy_set_header X-Forwarded-Email $auth_email;
      proxy_pass http://api_upstream;
    }

    proxy_pass http://web_upstream;
  }
}
