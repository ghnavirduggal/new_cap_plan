# Example oauth2-proxy config. Adapt to your OIDC provider.
# Run: oauth2-proxy --config=oauth2-proxy.cfg

http_address = "127.0.0.1:4180"
reverse_proxy = true

# --- OIDC provider (Okta / Auth0 / Azure AD / Google / Keycloak ...) ---
provider          = "oidc"
oidc_issuer_url   = "https://YOUR_ISSUER"        # e.g. https://login.microsoftonline.com/<tenant>/v2.0
client_id         = "YOUR_CLIENT_ID"
client_secret     = "YOUR_CLIENT_SECRET"
redirect_url      = "https://your-app-host/oauth2/callback"

# Restrict who may sign in (adjust or remove).
email_domains     = ["your-company.com"]

# A long random value; used to encrypt the session cookie.
cookie_secret     = "REPLACE_WITH_32_BYTE_RANDOM"
cookie_secure     = true
cookie_samesite   = "lax"

# Expose the authenticated email to nginx's auth_request as
# X-Auth-Request-Email (consumed in nginx.conf).
set_xauthrequest  = true
pass_access_token = false
skip_provider_button = true
